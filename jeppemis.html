<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeppemis Kanal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f4; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 90vw; 
            max-width: 1200px;
        }

        h1 { color: #27ae60; margin-top: 0; }

        /* Styling af sles.png så det fylder næsten hele skærmen */
        .big-image {
            width: 100%;
            height: auto;
            max-height: 75vh; /* Fylder 75% af skærmens højde */
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .back-btn { 
            display: inline-block; 
            padding: 15px 30px; 
            background-color: #333; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: background 0.3s;
        }

        .back-btn:hover { background-color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jeppemis</h1>
        
        <img src="sles.png" alt="Sles billede" class="big-image">
        
        <p>Velkommen til Jeppemis' kanal!</p>
        
        <a href="index.html" class="back-btn">← Tilbage til rejen</a>
    </div>

</body>
</html>
