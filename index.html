<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Gambling Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>My Gambling Game</h1>
  <div id="balance">Balance: $<span id="balance-amount">0</span></div>
  
  <div id="game">
    <input type="number" id="betAmount" placeholder="Enter your bet" />
    <button id="betButton">Place Bet</button>
  </div>
  
  <div id="result"></div>
  
  <!-- Sound effects -->
  <audio id="soundWin" src="win.wav"></audio>
  <audio id="soundLose" src="lose.wav"></audio>
  <audio id="soundSpin" src="spin.wav"></audio>
  
  <script src="script.js"></script>
</body>
</html>
