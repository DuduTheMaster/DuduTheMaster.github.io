<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Dudu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        h1 { margin-bottom: 10px; text-align: center; }
        p { margin-bottom: 50px; text-align: center; }

        .shrimp-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .rotating-shrimp {
            width: 500px; 
            max-width: 85vw;
            height: auto;
            cursor: pointer;
            animation: spin 3s linear infinite;
            user-select: none;
            -webkit-user-drag: none;
        }

        .fast-spin { animation: spin 0.1s linear infinite !important; }

        #timer {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            background: white;
            padding: 20px 40px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 40px;
            margin-bottom: 50px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>Den 05/05-2026 udkommer afsnit 3 af Minecraft ifølge religioner</h1>
    <p>Alex Missen slap af.</p>

    <div class="shrimp-container">
        <img src="shrimp.png" alt="Roterende reje" class="rotating-shrimp" id="shrimp">
        <div id="timer">Tid på siden: 0s</div>
    </div>

    <script>
        (function() {
            // Vi gemmer starttiden i en konstant, der ikke kan ændres
            const startTime = Date.now();
            const timerElement = document.getElementById('timer');
            const shrimp = document.getElementById('shrimp');

            // Opdater timer baseret på reel tid gået
            setInterval(() => {
                const now = Date.now();
                const differenceInSeconds = Math.floor((now - startTime) / 1000);
                timerElement.innerText = "Tid på siden: " + differenceInSeconds + "s";
            }, 100); // Vi opdaterer oftere for at gøre det svært at overskrive teksten

            // Spin funktioner
            const startFast = () => shrimp.classList.add('fast-spin');
            const stopFast = () => shrimp.classList.remove('fast-spin');

            shrimp.onmousedown = startFast;
            shrimp.onmouseup = stopFast;
            shrimp.onmouseleave = stopFast;
            shrimp.ontouchstart = startFast;
            shrimp.ontouchend = stopFast;
        })();
    </script>

</body>
</html>
