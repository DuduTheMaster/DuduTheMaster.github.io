<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .leaderboard {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .player {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            background: #eee;
            font-weight: bold;
        }

        /* Top 3 farver */
        .gold { background: gold; }
        .silver { background: silver; }
        .bronze { background: #cd7f32; color: white; }
    </style>
</head>
<body>

<div class="leaderboard">
    <h1>Leaderboard</h1>

    <!-- HER ÆNDRER DU NAVN + POINT -->

    <div class="player gold">1. Alex - 1500</div>
    <div class="player silver">2. Rallemis - 1400</div>
    <div class="player bronze">3. Jeppemis - 1300</div>

    <div class="player">4. Biamis - 1200</div>
    <div class="player">5. Bastian - 1100</div>
    <div class="player">6. Player6 - 1000</div>
    <div class="player">7. Player7 - 900</div>
    <div class="player">8. Player8 - 800</div>
    <div class="player">9. Player9 - 700</div>
    <div class="player">10. Player10 - 600</div>

</div>

</body>
</html>
