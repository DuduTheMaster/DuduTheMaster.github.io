<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dudus online web-portal (se Dudu meatspin)">
    <meta name="keywords" content="Dudu Meatspin, Duduonline, dudu online, dudumeatspin">
    <title>Magic Dudu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        h1 { margin-bottom: 10px; text-align: center; }
        p { margin-bottom: 50px; text-align: center; }

        /* Kanal knapper styling */
        .channel-nav { margin-bottom: 20px; display: flex; gap: 10px; }
        .channel-btn { 
            padding: 10px 20px; 
            cursor: pointer; 
            border-radius: 5px; 
            border: 1px solid #333; 
            background: #fff;
            font-weight: bold;
        }
        
        .channel-content { display: none; text-align: center; margin-bottom: 20px; }
        .active-channel { display: block; }

        .shrimp-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .rotating-shrimp {
            width: 500px; 
            max-width: 85vw;
            height: auto;
            cursor: pointer;
            animation: spin 3s linear infinite;
            user-select: none;
            -webkit-user-drag: none;
        }

        .fast-spin { animation: spin 0.1s linear infinite !important; }

        #timer {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            background: white;
            padding: 20px 40px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 40px;
            margin-bottom: 50px;
            pointer-events: none; 
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>Den 05/05-2026 udkommer afsnit 3 af Minecraft ifølge religioner</h1>
    <p>Alex Missen slap af.</p>

    <div class="channel-nav">
        <button class="channel-btn" onclick="openChan('alex')">Alex</button>
        <button class="channel-btn" onclick="openChan('rallemis')">Rallemis</button>
        <button class="channel-btn" onclick="openChan('jeppemis')">Jeppemis</button>
        <button class="channel-btn" onclick="openChan('biamis')">Biamis</button>
    </div>

    <div id="alex" class="channel-content active-channel">
        <p>Her er teksten til Alex</p>
    </div>
    <div id="rallemis" class="channel-content">
        <p>Her er teksten til Rallemis</p>
    </div>
    <div id="jeppemis" class="channel-content">
        <p>Her er teksten til Jeppemis</p>
    </div>
    <div id="biamis" class="channel-content">
        <p>Her er teksten til Biamis</p>
    </div>

    <div class="shrimp-container">
        <img src="shrimp.png" alt="Roterende reje" class="rotating-shrimp" id="shrimp">
        <div id="timer">Tid på siden: 0s</div>
    </div>

    <script>
        // Logik til at skifte kanal
        function openChan(id) {
            var i, x = document.getElementsByClassName("channel-content");
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";
            }
            document.getElementById(id).style.display = "block";
        }

        (function() {
            const startTime = Date.now();
            const timerElement = document.getElementById('timer');
            const shrimp = document.getElementById('shrimp');

            const updateTimer = () => {
                const now = Date.now();
                const differenceInSeconds = Math.floor((now - startTime) / 1000);
                const correctText = "Tid på siden: " + differenceInSeconds + "s";
                
                if (timerElement.innerText !== correctText) {
                    timerElement.innerText = correctText;
                }
            };

            setInterval(updateTimer, 50);

            const observer = new MutationObserver(() => {
                updateTimer();
            });

            observer.observe(timerElement, {
                characterData: true,
                childList: true,
                subtree: true
            });

            const startFast = () => shrimp.classList.add('fast-spin');
            const stopFast = () => shrimp.classList.remove('fast-spin');

            shrimp.onmousedown = startFast;
            shrimp.onmouseup = stopFast;
            shrimp.onmouseleave = stopFast;
            shrimp.ontouchstart = startFast;
            shrimp.ontouchend = stopFast;

            shrimp.oncontextmenu = (e) => e.preventDefault();
            timerElement.oncontextmenu = (e) => e.preventDefault();
        })();
    </script>

</body>
</html>
