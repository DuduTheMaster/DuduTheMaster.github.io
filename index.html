<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dudus online web-portal (se Dudu meatspin)">
    <meta name="keywords" content="Dudu Meatspin, Duduonline, dudu online, dudumeatspin">
    <title>Magic Dudu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centrerer lodret */
            align-items: center; /* Centrerer vandret */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* Forhindrer scroll hvis rejen går amok */
        }

        .shrimp-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Rejen er nu gjort større (500px) */
        .rotating-shrimp {
            width: 500px; 
            max-width: 90vw;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
            animation: spin 3s linear infinite; /* Standard hastighed */
            user-select: none; /* Forhindrer at man markerer billedet ved klik */
        }

        /* Denne klasse tilføjes via JavaScript når man klikker */
        .fast-spin {
            animation: spin 0.1s linear infinite !important;
        }

        #timer {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1, p {
            position: absolute;
            top: 20px;
            text-align: center;
        }
        p { top: 80px; }
    </style>
</head>
<body>

    <h1>Den 05/05-2026 udkommer afsnit 3 af Minecraft ifølge religioner</h1>
    <p>Alex Missen slap af.</p>

    <div class="shrimp-container">
        <img src="shrimp.png" 
             alt="Roterende reje" 
             class="rotating-shrimp" 
             id="shrimp"
             onmousedown="startFastSpin()" 
             onmouseup="stopFastSpin()"
             onmouseleave="stopFastSpin()"
             ontouchstart="startFastSpin()" 
             ontouchend="stopFastSpin()">

        <div id="timer">Tid på siden: 0s</div>
    </div>

    <script>
        // Timer logik
        let seconds = 0;
        const timerElement = document.getElementById('timer');

        setInterval(() => {
            seconds++;
            timerElement.innerText = "Tid på siden: " + seconds + "s";
        }, 1000);

        // Spin logik
        const shrimp = document.getElementById('shrimp');

        function startFastSpin() {
            shrimp.classList.add('fast-spin');
        }

        function stopFastSpin() {
            shrimp.classList.remove('fast-spin');
        }
    </script>

</body>
</html>
